<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>炭大錢水電材料行</title>

<style>
body { margin:0; font-family:"Microsoft JhengHei"; background:#f0f2f5;}
header { background:#ff6f00; color:white; padding:15px; text-align:center;}

.main { display:flex; }
.products {
    flex:3;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

.card {
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card img { width:100%; height:150px; object-fit:cover; }

.cart {
    flex:1;
    background:white;
    padding:15px;
    border-left:1px solid #ddd;
}

.hidden { display:none; }

.admin {
    padding:20px;
    background:#fff3e0;
}

input { width:100%; padding:8px; margin:5px 0; }

button { padding:6px 10px; cursor:pointer; margin:2px;}
</style>
</head>

<body>

<header>
炭大錢水電材料行 🛠
<button onclick="toggleAdmin()">⚙ 後台</button>
</header>

<!-- 後台 -->
<div class="admin hidden" id="adminPanel">
<h2>📦 商品管理</h2>

<input id="pname" placeholder="商品名稱">
<input id="pprice" placeholder="價格">
<input id="pimg" placeholder="圖片URL">
<button onclick="addProduct()">新增商品</button>

<hr>

<h3>📋 商品列表</h3>
<div id="adminList"></div>
</div>

<!-- 商店頁 -->
<div id="shopPage" class="main">
<div class="products" id="productList"></div>

<div class="cart">
<h2>🛒 購物車</h2>
<div id="cartItems"></div>
<h3 id="total"></h3>
<button onclick="goCheckout()">結帳</button>
</div>
</div>

<!-- 結帳 -->
<div id="checkoutPage" class="hidden" style="padding:20px;">
<h2>🧾 結帳</h2>
<input id="name" placeholder="姓名">
<input id="phone" placeholder="電話">
<input id="address" placeholder="地址">
<button onclick="submitOrder()">送出訂單</button>
<button onclick="back()">返回</button>
</div>

<!-- 完成 -->
<div id="donePage" class="hidden" style="padding:20px;">
<h2>🎉 訂單完成</h2>
<p id="orderInfo"></p>
<button onclick="restart()">回首頁</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [
    {name:"螺絲起子",price:100,img:"https://picsum.photos/200?1"},
    {name:"活動扳手",price:250,img:"https://picsum.photos/200?2"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
    localStorage.setItem("products",JSON.stringify(products));
    localStorage.setItem("cart",JSON.stringify(cart));
}

/* ===== 商品顯示 ===== */
function renderProducts(){
    let html="";
    products.forEach(p=>{
        html+=`
        <div class="card">
            <img src="${p.img}">
            <h3>${p.name}</h3>
            <p>${p.price}元</p>
            <button onclick="addToCart('${p.name}',${p.price})">加入購物車</button>
        </div>`;
    });
    productList.innerHTML=html;
}

/* ===== 後台 ===== */
function renderAdmin(){
    let html="";
    products.forEach((p,i)=>{
        html+=`
        <div style="margin:10px 0; padding:10px; background:#fff;">
            <img src="${p.img}" width="50"><br>
            <input value="${p.name}" onchange="editProduct(${i},'name',this.value)">
            <input value="${p.price}" onchange="editProduct(${i},'price',this.value)">
            <input value="${p.img}" onchange="editProduct(${i},'img',this.value)">
            <button onclick="deleteProduct(${i})">🗑 刪除</button>
        </div>`;
    });
    adminList.innerHTML=html;
}

function addProduct(){
    let name=pname.value;
    let price=parseInt(pprice.value);
    let img=pimg.value;

    if(!name||!price||!img){
        alert("請填完整");
        return;
    }

    products.push({name,price,img});
    save();
    renderProducts();
    renderAdmin();
}

function editProduct(index,field,value){
    if(field==="price") value=parseInt(value);
    products[index][field]=value;
    save();
    renderProducts();
    renderAdmin();
}

function deleteProduct(index){
    if(confirm("確定刪除？")){
        products.splice(index,1);
        save();
        renderProducts();
        renderAdmin();
    }
}

/* ===== 購物車 ===== */
function addToCart(name,price){
    let item=cart.find(i=>i.name===name);
    if(item) item.qty++;
    else cart.push({name,price,qty:1});
    save();
    renderCart();
}

function changeQty(i,d){
    cart[i].qty+=d;
    if(cart[i].qty<=0) cart.splice(i,1);
    save();
    renderCart();
}

function renderCart(){
    let html="";
    let total=0;

    cart.forEach((item,i)=>{
        total+=item.price*item.qty;
        html+=`
        <div>
        ${item.name}
        <button onclick="changeQty(${i},-1)">-</button>
        ${item.qty}
        <button onclick="changeQty(${i},1)">+</button>
        </div>`;
    });

    cartItems.innerHTML=html;
    document.getElementById("total").innerText="總金額："+total+"元";
}

/* ===== 結帳流程 ===== */
function goCheckout(){
    if(cart.length===0){ alert("購物車是空的"); return;}
    shopPage.classList.add("hidden");
    checkoutPage.classList.remove("hidden");
}

function back(){
    checkoutPage.classList.add("hidden");
    shopPage.classList.remove("hidden");
}

function submitOrder(){
    let name=document.getElementById("name").value;
    let phone=document.getElementById("phone").value;
    let address=document.getElementById("address").value;

    if(!name||!phone||!address){
        alert("請填完整資料"); return;
    }

    let orderId="TD"+Date.now();
    let summary=cart.map(i=>`${i.name} x${i.qty}`).join("<br>");

    checkoutPage.classList.add("hidden");
    donePage.classList.remove("hidden");

    orderInfo.innerHTML=`
    訂單編號：${orderId}<br>
    ${name}<br>${phone}<br>${address}<br><br>
    ${summary}
    `;

    cart=[];
    save();
    renderCart();
}

function restart(){
    donePage.classList.add("hidden");
    shopPage.classList.remove("hidden");
}

/* ===== UI ===== */
function toggleAdmin(){
    adminPanel.classList.toggle("hidden");
}

/* 初始化 */
renderProducts();
renderCart();
renderAdmin();
</script>

</body>
</html>
