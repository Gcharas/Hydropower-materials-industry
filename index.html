<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>炭大錢水電材料行</title>
<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:#2c3e50; color:#fff; padding:15px; text-align:center; }
nav { background:#34495e; padding:10px; text-align:center; }
nav button { margin:5px; padding:10px; border:none; cursor:pointer; }
.container { padding:20px; }
.card { background:#fff; padding:15px; margin:10px; border-radius:10px; display:inline-block; width:200px; }
button { background:#3498db; color:#fff; border:none; padding:5px 10px; cursor:pointer; }
.cart-item { margin:10px 0; }
.hidden { display:none; }
</style>
</head>

<body>

<header>
<h1>炭大錢水電材料行</h1>
</header>

<nav>
<button onclick="showPage('shop')">前台商店</button>
<button onclick="showPage('cart')">購物車</button>
<button onclick="showPage('admin')">後台管理</button>
</nav>

<div class="container">

<!-- 商店 -->
<div id="shop">
<h2>商品列表</h2>
<div id="productList"></div>
</div>

<!-- 購物車 -->
<div id="cart" class="hidden">
<h2>購物車</h2>
<div id="cartItems"></div>
<h3 id="total"></h3>
<button onclick="checkout()">前往結帳</button>
</div>

<!-- 結帳 -->
<div id="checkoutPage" class="hidden">
<h2>結帳</h2>
<input id="name" placeholder="姓名"><br><br>
<input id="phone" placeholder="電話"><br><br>
<input id="address" placeholder="地址"><br><br>
<button onclick="placeOrder()">送出訂單</button>
</div>

<!-- 訂單完成 -->
<div id="orderPage" class="hidden">
<h2>訂單完成 🎉</h2>
<div id="orderInfo"></div>
</div>

<!-- 後台 -->
<div id="admin" class="hidden">
<h2>後台管理</h2>

<input id="pname" placeholder="商品名稱">
<input id="pprice" placeholder="價格" type="number">
<button onclick="addProduct()">新增商品</button>

<h3>商品管理</h3>
<div id="adminList"></div>
</div>

</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [
  {id:1, name:"螺絲起子", price:100},
  {id:2, name:"活動扳手", price:250}
];

let cart = JSON.parse(localStorage.getItem('cart')) || [];

function save() {
  localStorage.setItem('products', JSON.stringify(products));
  localStorage.setItem('cart', JSON.stringify(cart));
}

function showPage(page) {
  document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
  document.getElementById(page).classList.remove('hidden');
  render();
}

function render() {
  renderProducts();
  renderCart();
  renderAdmin();
}

function renderProducts() {
  let html="";
  products.forEach(p=>{
    html+=`
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.price} 元</p>
      <button onclick="addToCart(${p.id})">加入購物車</button>
    </div>`;
  });
  document.getElementById('productList').innerHTML=html;
}

function addToCart(id){
  let item=cart.find(c=>c.id==id);
  if(item){item.qty++}
  else{cart.push({id, qty:1})}
  save();
  alert("已加入購物車");
}

function renderCart(){
  let html="";
  let total=0;

  cart.forEach(c=>{
    let p=products.find(p=>p.id==c.id);
    total+=p.price*c.qty;
    html+=`
    <div class="cart-item">
      ${p.name} ${p.price}元
      <button onclick="changeQty(${c.id},-1)">-</button>
      ${c.qty}
      <button onclick="changeQty(${c.id},1)">+</button>
      <button onclick="removeItem(${c.id})">刪除</button>
    </div>`;
  });

  document.getElementById('cartItems').innerHTML=html;
  document.getElementById('total').innerText="總金額："+total+" 元";
}

function changeQty(id,delta){
  let item=cart.find(c=>c.id==id);
  item.qty+=delta;
  if(item.qty<=0) cart=cart.filter(c=>c.id!=id);
  save();
  renderCart();
}

function removeItem(id){
  cart=cart.filter(c=>c.id!=id);
  save();
  renderCart();
}

function checkout(){
  showPage('checkoutPage');
}

function placeOrder(){
  let name=document.getElementById('name').value;
  let phone=document.getElementById('phone').value;
  let address=document.getElementById('address').value;

  let order="姓名："+name+"<br>電話："+phone+"<br>地址："+address+"<br><br>商品：<br>";

  cart.forEach(c=>{
    let p=products.find(p=>p.id==c.id);
    order+=p.name+" x "+c.qty+"<br>";
  });

  document.getElementById('orderInfo').innerHTML=order;

  cart=[];
  save();
  showPage('orderPage');
}

function addProduct(){
  let name=document.getElementById('pname').value;
  let price=parseInt(document.getElementById('pprice').value);

  if(!name || !price) return alert("請填完整");

  products.push({id:Date.now(), name, price});
  save();
  render();
}

function renderAdmin(){
  let html="";
  products.forEach(p=>{
    html+=`
    <div>
      ${p.name} - ${p.price}元
      <button onclick="editProduct(${p.id})">修改</button>
      <button onclick="deleteProduct(${p.id})">刪除</button>
    </div>`;
  });
  document.getElementById('adminList').innerHTML=html;
}

function deleteProduct(id){
  products=products.filter(p=>p.id!=id);
  save();
  render();
}

function editProduct(id){
  let p=products.find(p=>p.id==id);
  let name=prompt("新名稱",p.name);
  let price=prompt("新價格",p.price);
  if(name && price){
    p.name=name;
    p.price=parseInt(price);
    save();
    render();
  }
}

render();
</script>

</body>
</html>
